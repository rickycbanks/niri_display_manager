name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build source tarball and attach to GitHub Release ──────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      sha256:  ${{ steps.sha256.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build source tarball
        run: |
          git archive \
            --format=tar.gz \
            --prefix=niri_display_manager-${{ steps.get_version.outputs.version }}/ \
            HEAD \
            -o niri-display-manager-${{ steps.get_version.outputs.version }}.tar.gz

      - name: Compute sha256
        id: sha256
        run: |
          HASH=$(sha256sum niri-display-manager-${{ steps.get_version.outputs.version }}.tar.gz | awk '{print $1}')
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.get_version.outputs.version }}"
          generate_release_notes: true
          files: niri-display-manager-${{ steps.get_version.outputs.version }}.tar.gz

  # ── Publish PKGBUILD to AUR ────────────────────────────────────
  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: release
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm --needed git openssh pacman

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update PKGBUILD version and sha256
        run: |
          VERSION=${{ needs.release.outputs.version }}
          SHA256=${{ needs.release.outputs.sha256 }}
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/"       packaging/aur/PKGBUILD
          sed -i "s/sha256sums=('[^']*')/sha256sums=('$SHA256')/" packaging/aur/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          # makepkg --printsrcinfo requires a non-root user
          useradd -m builder
          cp -r packaging/aur /tmp/aur
          chown -R builder /tmp/aur
          su builder -c "cd /tmp/aur && makepkg --printsrcinfo > .SRCINFO"
          cp /tmp/aur/.SRCINFO packaging/aur/.SRCINFO

      - name: Push to AUR
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new"
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          git clone ssh://aur@aur.archlinux.org/niri-display-manager.git /tmp/aur-repo
          cp packaging/aur/PKGBUILD /tmp/aur-repo/PKGBUILD
          cp packaging/aur/.SRCINFO  /tmp/aur-repo/.SRCINFO
          cd /tmp/aur-repo
          git config user.name  "rickycbanks"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${{ needs.release.outputs.version }}"
          git push
