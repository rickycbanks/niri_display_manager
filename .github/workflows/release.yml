name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build source tarball and attach to GitHub Release ──────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      sha256:  ${{ steps.sha256.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build source tarball
        run: |
          git archive \
            --format=tar.gz \
            --prefix=niri_display_manager-${{ steps.get_version.outputs.version }}/ \
            HEAD \
            -o niri-display-manager-${{ steps.get_version.outputs.version }}.tar.gz

      - name: Compute sha256
        id: sha256
        run: |
          HASH=$(sha256sum niri-display-manager-${{ steps.get_version.outputs.version }}.tar.gz | awk '{print $1}')
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.get_version.outputs.version }}"
          generate_release_notes: true
          files: niri-display-manager-${{ steps.get_version.outputs.version }}.tar.gz

  # ── Publish PKGBUILD to AUR ────────────────────────────────────
  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update PKGBUILD version and sha256
        run: |
          VERSION=${{ needs.release.outputs.version }}
          SHA256=${{ needs.release.outputs.sha256 }}
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/PKGBUILD
          sed -i "s/sha256sums=('[^']*')/sha256sums=('$SHA256')/" packaging/aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: niri-display-manager
          pkgbuild: packaging/aur/PKGBUILD
          commit_username: rickycbanks
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ needs.release.outputs.version }}"
          force_push: true
